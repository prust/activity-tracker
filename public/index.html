<!doctype html>
<html>
  <head>
    <title>Activity Tracker</title>
    <style>
      html { margin: 0; height: 100% }
      body { margin: 0; height: 100% }
      .text_bin { cursor: pointer }
      
      .block { display: inline-block; cursor: pointer; height: 100px; }
      #details { height: calc(100% - 120px); overflow-y: auto}
      .block.gap { cursor: default }

      .unknown { background-color: #dbdbdb}

      .hud { text-align: center }
      .pct { font-size: 100pt}
      .pct.success { color: #090}
      .pct.warn { color: #F90}
      .pct.danger { color: #F00}
      .min { color: #666; font-style: italic; font-size: 30pt}
    </style>
  </head>
  <body>
    <div id="bars"></div>
    <div id="details"></div>
    <script type="module" src="index.js"></script>
  </body>
</html>
